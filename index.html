<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Bitácora Podología</title>
<meta name="theme-color" content="#3a7d6c">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Bitácora">
<link id="apple-icon" rel="apple-touch-icon" href="">
<link id="favicon-icon" rel="icon" type="image/png" href="">
<link id="manifest-link" rel="manifest" href="">

<style>
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { margin: 0; padding: 0; background-color: #f6f4ef; overscroll-behavior-y: none; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; }
  input:focus, textarea:focus { outline: 2px solid #5fa89a; outline-offset: 1px; }
  button:focus-visible { outline: 2px solid #5fa89a; outline-offset: 2px; }
  #root { min-height: 100vh; }

  .install-banner {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    background: #1e2d2a;
    color: #fff;
    padding: 14px 18px;
    display: flex;
    align-items: center;
    gap: 12px;
    z-index: 9999;
    box-shadow: 0 -4px 20px rgba(0,0,0,0.2);
    font-size: 13.5px;
  }
  .install-banner img { width: 36px; height: 36px; border-radius: 9px; flex-shrink: 0; }
  .install-banner .txt { flex: 1; line-height: 1.4; }
  .install-banner button {
    background: #3a7d6c; color: #fff; border: none; border-radius: 9px;
    padding: 9px 14px; font-size: 13px; font-weight: 700; cursor: pointer; white-space: nowrap;
  }
  .install-banner .close-x {
    background: transparent; color: rgba(255,255,255,0.6); padding: 4px; font-size: 18px; font-weight: 400;
  }
</style>

<script src="https://unpkg.com/react@18.3.1/umd/react.production.min.js" crossorigin onerror="document.getElementById('root').innerHTML='<div style=padding:24px;font-family:sans-serif;color:#c0392b;>No se pudo cargar React. Revisa tu conexión a internet e intenta de nuevo.</div>'"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.production.min.js" crossorigin></script>
<script src="https://unpkg.com/@babel/standalone@7.25.6/babel.min.js" crossorigin></script>
</head>
<body>

<div id="root">
  <div style="min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;font-family:sans-serif;background:#f6f4ef;">
    <div style="width:40px;height:40px;border:3px solid #cfe3dc;border-top-color:#3a7d6c;border-radius:50%;animation:spin 0.8s linear infinite;"></div>
    <div style="color:#5a6e6a;font-size:14px;">Cargando bitácora…</div>
  </div>
</div>
<style>@keyframes spin{to{transform:rotate(360deg)}}</style>

<div id="install-banner" class="install-banner" style="display:none;">
  <img id="install-icon" src="" alt="">
  <div class="txt">Instala esta app en tu pantalla de inicio para acceso rápido</div>
  <button id="install-btn">Instalar</button>
  <button class="close-x" id="install-close">✕</button>
</div>

<script>
window.addEventListener('error', function(e) {
  var root = document.getElementById('root');
  if (root) {
    root.innerHTML =
      '<div style="padding:24px;font-family:sans-serif;color:#c0392b;background:#fdecea;margin:16px;border-radius:12px;">' +
      '<b>Error al cargar la app:</b><br><br>' +
      (e.message || 'Error desconocido') +
      '<br><br><span style="color:#555;font-size:13px;">Archivo: ' + (e.filename || '?') + ' — Línea: ' + (e.lineno || '?') + '</span></div>';
  }
});
</script>

<script type="text/babel" data-presets="react">
const { useState, useEffect, useMemo } = React;

function Icon({ path, size = 18, color = 'currentColor', strokeWidth = 2 }) {
  return (
    <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth={strokeWidth} strokeLinecap="round" strokeLinejoin="round">
      {path}
    </svg>
  );
}

const Plus = (p) => <Icon {...p} path={<><path d="M12 5v14M5 12h14"/></>} />;
const Calendar = (p) => <Icon {...p} path={<><rect x="3" y="4" width="18" height="18" rx="2"/><path d="M16 2v4M8 2v4M3 10h18"/></>} />;
const Phone = (p) => <Icon {...p} path={<path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72c.127.96.361 1.903.7 2.81a2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0 1 22 16.92z"/>} />;
const MapPin = (p) => <Icon {...p} path={<><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></>} />;
const DollarSign = (p) => <Icon {...p} path={<><path d="M12 1v22M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></>} />;
const X = (p) => <Icon {...p} path={<><path d="M18 6 6 18M6 6l12 12"/></>} />;
const Check = (p) => <Icon {...p} path={<path d="M20 6 9 17l-5-5"/>} />;
const Clock = (p) => <Icon {...p} path={<><circle cx="12" cy="12" r="10"/><path d="M12 6v6l4 2"/></>} />;
const AlertCircle = (p) => <Icon {...p} path={<><circle cx="12" cy="12" r="10"/><path d="M12 8v4M12 16h.01"/></>} />;
const Search = (p) => <Icon {...p} path={<><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></>} />;
const ChevronLeft = (p) => <Icon {...p} path={<path d="M15 18l-6-6 6-6"/>} />;
const Trash2 = (p) => <Icon {...p} path={<><path d="M3 6h18M8 6V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2m3 0v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6h14z"/><path d="M10 11v6M14 11v6"/></>} />;
const Edit2 = (p) => <Icon {...p} path={<path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/>} />;
const Download = (p) => <Icon {...p} path={<><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4M7 10l5 5 5-5M12 15V3"/></>} />;
const FileText = (p) => <Icon {...p} path={<><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><path d="M14 2v6h6M16 13H8M16 17H8M10 9H8"/></>} />;

const SERVICIOS = {
  basico: { label: 'Servicio básico', precio: 350 },
  unaEncarnada: { label: 'Retiro uña encarnada', precio: 200 },
  anestesia: { label: 'Anestesia local', precio: 200 },
};

function calcularCosto(serviciosSeleccionados) {
  return Object.keys(serviciosSeleccionados)
    .filter(k => serviciosSeleccionados[k])
    .reduce((sum, k) => sum + SERVICIOS[k].precio, 0);
}

function formatFecha(dateStr) {
  if (!dateStr) return '';
  const d = new Date(dateStr + 'T00:00:00');
  return d.toLocaleDateString('es-MX', { weekday: 'short', day: 'numeric', month: 'short' });
}

function addWeeks(dateStr, weeks) {
  const d = new Date(dateStr + 'T00:00:00');
  d.setDate(d.getDate() + weeks * 7);
  return d.toISOString().split('T')[0];
}

function diasRestantes(dateStr) {
  const hoy = new Date();
  hoy.setHours(0, 0, 0, 0);
  const fecha = new Date(dateStr + 'T00:00:00');
  return Math.round((fecha - hoy) / (1000 * 60 * 60 * 24));
}

const STORAGE_KEY = 'bitacora-citas-v1';

function App() {
  const [citas, setCitas] = useState([]);
  const [loaded, setLoaded] = useState(false);
  const [view, setView] = useState('agenda'); // agenda | seguimiento | nueva | detalle
  const [citaActiva, setCitaActiva] = useState(null);
  const [busqueda, setBusqueda] = useState('');
  const [saveError, setSaveError] = useState(false);

  // Cargar datos al iniciar
  useEffect(() => {
    try {
      const raw = localStorage.getItem(STORAGE_KEY);
      if (raw) setCitas(JSON.parse(raw));
    } catch (e) {
      // no existe aún, está bien
    }
    setLoaded(true);
  }, []);

  // Guardar cada vez que cambian las citas
  useEffect(() => {
    if (!loaded) return;
    try {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(citas));
      setSaveError(false);
    } catch (e) {
      setSaveError(true);
    }
  }, [citas, loaded]);

  function guardarCita(cita) {
    if (cita.id) {
      setCitas(prev => prev.map(c => c.id === cita.id ? cita : c));
    } else {
      const nueva = { ...cita, id: Date.now().toString() };
      setCitas(prev => [...prev, nueva]);
    }
    setView('agenda');
    setCitaActiva(null);
  }

  function eliminarCita(id) {
    setCitas(prev => prev.filter(c => c.id !== id));
    setView('agenda');
    setCitaActiva(null);
  }

  const citasOrdenadas = useMemo(() => {
    return [...citas]
      .filter(c => c.estado !== 'cancelada')
      .filter(c => {
        if (!busqueda.trim()) return true;
        const q = busqueda.toLowerCase();
        return c.nombre.toLowerCase().includes(q) || c.direccion.toLowerCase().includes(q);
      })
      .sort((a, b) => (a.fecha + a.hora).localeCompare(b.fecha + b.hora));
  }, [citas, busqueda]);

  const proximasASeguimiento = useMemo(() => {
    return citas
      .filter(c => c.estado === 'completada' && c.proximoSeguimiento)
      .map(c => ({ ...c, dias: diasRestantes(c.proximoSeguimiento) }))
      .filter(c => c.dias <= 7)
      .sort((a, b) => a.dias - b.dias);
  }, [citas]);

  const totalMes = useMemo(() => {
    const hoy = new Date();
    const mesActual = hoy.toISOString().slice(0, 7);
    return citas
      .filter(c => c.fecha?.startsWith(mesActual) && c.pagado)
      .reduce((sum, c) => sum + (c.costo || 0), 0);
  }, [citas]);

  const pendientesCobro = useMemo(() => {
    return citas.filter(c => c.estado === 'completada' && !c.pagado);
  }, [citas]);

  function exportarRespaldo() {
    const headers = ['Nombre', 'Telefono', 'Direccion', 'Fecha', 'Hora', 'Estado', 'Servicios', 'Costo', 'Pagado', 'Observaciones', 'ProximoSeguimiento'];
    const filas = citas.map(c => {
      const serviciosTxt = Object.keys(SERVICIOS).filter(k => c.servicios?.[k]).map(k => SERVICIOS[k].label).join(' + ');
      return [
        c.nombre, c.telefono, c.direccion, c.fecha, c.hora,
        c.estado, serviciosTxt, c.costo, c.pagado ? 'Si' : 'No',
        (c.observaciones || '').replace(/\n/g, ' '), c.proximoSeguimiento || ''
      ].map(v => `"${String(v ?? '').replace(/"/g, '""')}"`).join(',');
    });
    const csv = '\uFEFF' + [headers.join(','), ...filas].join('\n');
    const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    const fechaHoy = new Date().toISOString().split('T')[0];
    a.href = url;
    a.download = `respaldo-bitacora-podologia-${fechaHoy}.csv`;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
  }

  if (!loaded) {
    return (
      <div style={styles.loadingScreen}>
        <div style={styles.loadingText}>Cargando bitácora…</div>
      </div>
    );
  }

  return (
    <div style={styles.app}>
      <style>{`
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { margin: 0; }
        input:focus, textarea:focus { outline: 2px solid #5fa89a; outline-offset: 1px; }
        button:focus-visible { outline: 2px solid #5fa89a; outline-offset: 2px; }
      `}</style>

      {view === 'agenda' && (
        <AgendaView
          citas={citasOrdenadas}
          totalMes={totalMes}
          pendientesCobro={pendientesCobro}
          proximasASeguimiento={proximasASeguimiento}
          busqueda={busqueda}
          setBusqueda={setBusqueda}
          onNueva={() => { setCitaActiva(null); setView('nueva'); }}
          onSeleccionar={(c) => { setCitaActiva(c); setView('detalle'); }}
          onVerSeguimiento={() => setView('seguimiento')}
          saveError={saveError}
          onExportar={exportarRespaldo}
        />
      )}

      {view === 'seguimiento' && (
        <SeguimientoView
          lista={proximasASeguimiento}
          onVolver={() => setView('agenda')}
          onSeleccionar={(c) => { setCitaActiva(citas.find(x => x.id === c.id)); setView('detalle'); }}
        />
      )}

      {view === 'nueva' && (
        <FormView
          citaInicial={null}
          onGuardar={guardarCita}
          onCancelar={() => setView('agenda')}
        />
      )}

      {view === 'detalle' && citaActiva && (
        <DetalleView
          cita={citaActiva}
          onEditar={() => setView('editar')}
          onEliminar={() => eliminarCita(citaActiva.id)}
          onVolver={() => { setView('agenda'); setCitaActiva(null); }}
          onMarcarCompletada={(c) => guardarCita(c)}
          onMarcarPagada={(c) => guardarCita(c)}
          onCancelarCita={(c) => guardarCita(c)}
        />
      )}

      {view === 'editar' && citaActiva && (
        <FormView
          citaInicial={citaActiva}
          onGuardar={guardarCita}
          onCancelar={() => setView('detalle')}
        />
      )}
    </div>
  );
}

function AgendaView({ citas, totalMes, pendientesCobro, proximasASeguimiento, busqueda, setBusqueda, onNueva, onSeleccionar, onVerSeguimiento, saveError, onExportar }) {
  return (
    <div style={styles.screen}>
      <header style={styles.header}>
        <div>
          <p style={styles.eyebrow}>Bitácora</p>
          <h1 style={styles.h1}>Mis pacientes</h1>
        </div>
        <div style={{ display: 'flex', gap: 8 }}>
          <button style={styles.exportBtn} onClick={onExportar} aria-label="Exportar respaldo">
            <Download size={19} color="#3a7d6c" strokeWidth={2.5} />
          </button>
          <button style={styles.addBtn} onClick={onNueva} aria-label="Nueva cita">
            <Plus size={24} color="#fff" strokeWidth={2.5} />
          </button>
        </div>
      </header>

      {saveError && (
        <div style={styles.errorBanner}>
          <AlertCircle size={16} />
          <span>No se pudo guardar. Revisa el almacenamiento.</span>
        </div>
      )}

      <div style={styles.statsRow}>
        <div style={styles.statCard}>
          <DollarSign size={18} color="#3a7d6c" />
          <div>
            <div style={styles.statValue}>${totalMes}</div>
            <div style={styles.statLabel}>Cobrado este mes</div>
          </div>
        </div>
        <div style={{...styles.statCard, ...(pendientesCobro.length > 0 ? styles.statCardWarn : {})}}>
          <Clock size={18} color={pendientesCobro.length > 0 ? '#b5651d' : '#3a7d6c'} />
          <div>
            <div style={styles.statValue}>{pendientesCobro.length}</div>
            <div style={styles.statLabel}>Pagos pendientes</div>
          </div>
        </div>
      </div>

      {proximasASeguimiento.length > 0 && (
        <button style={styles.seguimientoBanner} onClick={onVerSeguimiento}>
          <Calendar size={18} color="#fff" />
          <span style={{ flex: 1, textAlign: 'left' }}>
            {proximasASeguimiento.length} paciente{proximasASeguimiento.length > 1 ? 's' : ''} para seguimiento esta semana
          </span>
          <span style={{ fontSize: 18 }}>→</span>
        </button>
      )}

      <div style={styles.searchBox}>
        <Search size={17} color="#94a3a8" />
        <input
          style={styles.searchInput}
          placeholder="Buscar paciente o colonia…"
          value={busqueda}
          onChange={e => setBusqueda(e.target.value)}
        />
      </div>

      <div style={styles.list}>
        {citas.length === 0 && (
          <div style={styles.empty}>
            <Calendar size={40} color="#c8d4d2" />
            <p style={styles.emptyText}>Aún no hay citas registradas</p>
            <p style={styles.emptySubtext}>Toca el botón + para agregar tu primer paciente</p>
          </div>
        )}

        {citas.map(c => (
          <CitaCard key={c.id} cita={c} onClick={() => onSeleccionar(c)} />
        ))}
      </div>
    </div>
  );
}

function CitaCard({ cita, onClick }) {
  const dias = diasRestantes(cita.fecha);
  let badgeText = formatFecha(cita.fecha);
  let badgeColor = '#5fa89a';

  if (cita.estado === 'completada') {
    badgeColor = '#94a3a8';
    badgeText = 'Completada';
  } else if (dias === 0) {
    badgeColor = '#3a7d6c';
    badgeText = 'Hoy';
  } else if (dias < 0) {
    badgeColor = '#b5651d';
    badgeText = 'Vencida';
  }

  return (
    <button style={styles.card} onClick={onClick}>
      <div style={styles.cardTop}>
        <span style={styles.cardName}>{cita.nombre}</span>
        <span style={{ ...styles.badge, backgroundColor: badgeColor }}>{badgeText}</span>
      </div>
      <div style={styles.cardRow}>
        <Clock size={13} color="#7a8e8a" />
        <span style={styles.cardMeta}>{cita.hora || '—'}</span>
        <MapPin size={13} color="#7a8e8a" style={{ marginLeft: 10 }} />
        <span style={styles.cardMeta}>{cita.direccion || 'Sin dirección'}</span>
      </div>
      <div style={styles.cardRow}>
        <span style={styles.cardCosto}>${cita.costo}</span>
        {cita.estado === 'completada' && !cita.pagado && (
          <span style={styles.pendientePill}>Sin cobrar</span>
        )}
      </div>
    </button>
  );
}

function SeguimientoView({ lista, onVolver, onSeleccionar }) {
  return (
    <div style={styles.screen}>
      <header style={styles.headerSimple}>
        <button style={styles.backBtn} onClick={onVolver}><ChevronLeft size={22} color="#1e2d2a" /></button>
        <h1 style={styles.h1Small}>Seguimiento</h1>
      </header>

      <p style={styles.sectionDesc}>Pacientes con cita sugerida en los próximos 7 días, según su última visita.</p>

      <div style={styles.list}>
        {lista.length === 0 && (
          <div style={styles.empty}>
            <Check size={36} color="#c8d4d2" />
            <p style={styles.emptyText}>Sin seguimientos pendientes</p>
          </div>
        )}
        {lista.map(c => (
          <button key={c.id} style={styles.card} onClick={() => onSeleccionar(c)}>
            <div style={styles.cardTop}>
              <span style={styles.cardName}>{c.nombre}</span>
              <span style={{
                ...styles.badge,
                backgroundColor: c.dias <= 0 ? '#b5651d' : c.dias <= 2 ? '#d4874a' : '#5fa89a'
              }}>
                {c.dias === 0 ? 'Hoy' : c.dias < 0 ? `Hace ${Math.abs(c.dias)}d` : `En ${c.dias}d`}
              </span>
            </div>
            <div style={styles.cardRow}>
              <Phone size={13} color="#7a8e8a" />
              <span style={styles.cardMeta}>{c.telefono || 'Sin teléfono'}</span>
            </div>
            <div style={styles.cardRow}>
              <span style={styles.cardMeta}>Última visita: {formatFecha(c.fecha)}</span>
            </div>
          </button>
        ))}
      </div>
    </div>
  );
}

function DetalleView({ cita, onEditar, onEliminar, onVolver, onMarcarCompletada, onMarcarPagada, onCancelarCita }) {
  const [confirmarBorrar, setConfirmarBorrar] = useState(false);

  return (
    <div style={styles.screen}>
      <header style={styles.headerSimple}>
        <button style={styles.backBtn} onClick={onVolver}><ChevronLeft size={22} color="#1e2d2a" /></button>
        <h1 style={styles.h1Small}>Detalle</h1>
        <button style={styles.iconBtn} onClick={onEditar}><Edit2 size={18} color="#3a7d6c" /></button>
      </header>

      <div style={styles.detailCard}>
        <h2 style={styles.detailName}>{cita.nombre}</h2>
        <div style={{ ...styles.estadoPill, ...(cita.estado === 'completada' ? styles.estadoCompletada : cita.estado === 'cancelada' ? styles.estadoCancelada : styles.estadoProgramada) }}>
          {cita.estado === 'completada' ? 'Completada' : cita.estado === 'cancelada' ? 'Cancelada' : 'Programada'}
        </div>

        <div style={styles.detailGrid}>
          <DetailRow icon={<Calendar size={16} color="#5fa89a" />} label="Fecha" value={formatFecha(cita.fecha)} />
          <DetailRow icon={<Clock size={16} color="#5fa89a" />} label="Hora" value={cita.hora || '—'} />
          <DetailRow icon={<Phone size={16} color="#5fa89a" />} label="Teléfono" value={cita.telefono || '—'} />
          <DetailRow icon={<MapPin size={16} color="#5fa89a" />} label="Dirección" value={cita.direccion || '—'} />
        </div>

        <div style={styles.divider} />

        <div style={styles.serviciosBox}>
          <p style={styles.boxLabel}>Servicios</p>
          {Object.keys(SERVICIOS).filter(k => cita.servicios?.[k]).map(k => (
            <div key={k} style={styles.servicioLine}>
              <span>{SERVICIOS[k].label}</span>
              <span>${SERVICIOS[k].precio}</span>
            </div>
          ))}
          <div style={styles.totalLine}>
            <span>Total</span>
            <span>${cita.costo}</span>
          </div>
        </div>

        {cita.observaciones && (
          <>
            <div style={styles.divider} />
            <div style={styles.serviciosBox}>
              <p style={styles.boxLabel}>Observaciones</p>
              <p style={styles.obsText}>{cita.observaciones}</p>
            </div>
          </>
        )}

        {cita.proximoSeguimiento && (
          <>
            <div style={styles.divider} />
            <DetailRow icon={<Calendar size={16} color="#d4874a" />} label="Próximo seguimiento" value={formatFecha(cita.proximoSeguimiento)} />
          </>
        )}
      </div>

      <div style={styles.actionsBox}>
        {cita.estado === 'programada' && (
          <>
            <button style={styles.primaryAction} onClick={() => onMarcarCompletada({ ...cita, estado: 'completada', proximoSeguimiento: addWeeks(cita.fecha, 4) })}>
              <Check size={18} /> Marcar como completada
            </button>
            <button style={styles.dangerAction} onClick={() => onCancelarCita({ ...cita, estado: 'cancelada' })}>
              <X size={18} /> Cancelar cita
            </button>
          </>
        )}

        {cita.estado === 'completada' && !cita.pagado && (
          <button style={styles.primaryAction} onClick={() => onMarcarPagada({ ...cita, pagado: true })}>
            <DollarSign size={18} /> Marcar como pagado
          </button>
        )}

        {!confirmarBorrar ? (
          <button style={styles.ghostAction} onClick={() => setConfirmarBorrar(true)}>
            <Trash2 size={16} /> Eliminar registro
          </button>
        ) : (
          <div style={styles.confirmBox}>
            <p style={styles.confirmText}>¿Eliminar este registro permanentemente?</p>
            <div style={{ display: 'flex', gap: 8 }}>
              <button style={styles.confirmCancel} onClick={() => setConfirmarBorrar(false)}>No</button>
              <button style={styles.confirmDelete} onClick={onEliminar}>Sí, eliminar</button>
            </div>
          </div>
        )}
      </div>
    </div>
  );
}

function DetailRow({ icon, label, value }) {
  return (
    <div style={styles.detailRow}>
      {icon}
      <div>
        <div style={styles.detailLabel}>{label}</div>
        <div style={styles.detailValue}>{value}</div>
      </div>
    </div>
  );
}

function FormView({ citaInicial, onGuardar, onCancelar }) {
  const [nombre, setNombre] = useState(citaInicial?.nombre || '');
  const [telefono, setTelefono] = useState(citaInicial?.telefono || '');
  const [direccion, setDireccion] = useState(citaInicial?.direccion || '');
  const [fecha, setFecha] = useState(citaInicial?.fecha || new Date().toISOString().split('T')[0]);
  const [hora, setHora] = useState(citaInicial?.hora || '');
  const [servicios, setServicios] = useState(citaInicial?.servicios || { basico: true, unaEncarnada: false, anestesia: false });
  const [observaciones, setObservaciones] = useState(citaInicial?.observaciones || '');
  const [error, setError] = useState('');

  const costo = calcularCosto(servicios);

  function toggleServicio(key) {
    setServicios(prev => ({ ...prev, [key]: !prev[key] }));
  }

  function handleGuardar() {
    if (!nombre.trim()) { setError('Escribe el nombre del paciente'); return; }
    if (!fecha) { setError('Selecciona una fecha'); return; }

    onGuardar({
      ...(citaInicial || {}),
      nombre: nombre.trim(),
      telefono: telefono.trim(),
      direccion: direccion.trim(),
      fecha,
      hora,
      servicios,
      costo,
      observaciones: observaciones.trim(),
      estado: citaInicial?.estado || 'programada',
      pagado: citaInicial?.pagado || false,
    });
  }

  return (
    <div style={styles.screen}>
      <header style={styles.headerSimple}>
        <button style={styles.backBtn} onClick={onCancelar}><ChevronLeft size={22} color="#1e2d2a" /></button>
        <h1 style={styles.h1Small}>{citaInicial ? 'Editar cita' : 'Nueva cita'}</h1>
        <div style={{ width: 38 }} />
      </header>

      <div style={styles.form}>
        <Field label="Nombre del paciente">
          <input style={styles.input} value={nombre} onChange={e => setNombre(e.target.value)} placeholder="Ej. María González" />
        </Field>

        <Field label="Teléfono">
          <input style={styles.input} value={telefono} onChange={e => setTelefono(e.target.value)} placeholder="Ej. 5512345678" type="tel" />
        </Field>

        <Field label="Dirección">
          <input style={styles.input} value={direccion} onChange={e => setDireccion(e.target.value)} placeholder="Calle, colonia" />
        </Field>

        <div style={styles.fieldRow}>
          <Field label="Fecha" style={{ flex: 1 }}>
            <input style={styles.input} type="date" value={fecha} onChange={e => setFecha(e.target.value)} />
          </Field>
          <Field label="Hora" style={{ flex: 1 }}>
            <input style={styles.input} type="time" value={hora} onChange={e => setHora(e.target.value)} />
          </Field>
        </div>

        <Field label="Servicios">
          <div style={styles.serviciosForm}>
            {Object.entries(SERVICIOS).map(([key, s]) => (
              <button
                key={key}
                type="button"
                style={{ ...styles.servicioToggle, ...(servicios[key] ? styles.servicioToggleActive : {}) }}
                onClick={() => toggleServicio(key)}
              >
                <span>{s.label}</span>
                <span style={styles.servicioPrecio}>${s.precio}</span>
              </button>
            ))}
          </div>
        </Field>

        <div style={styles.costoBox}>
          <span>Costo total</span>
          <span style={styles.costoValor}>${costo}</span>
        </div>

        <Field label="Observaciones">
          <textarea
            style={styles.textarea}
            value={observaciones}
            onChange={e => setObservaciones(e.target.value)}
            placeholder="Ej. Vive en 3er piso sin elevador, tiene diabetes…"
            rows={3}
          />
        </Field>

        {error && (
          <div style={styles.errorBanner}>
            <AlertCircle size={16} />
            <span>{error}</span>
          </div>
        )}

        <button style={styles.saveBtn} onClick={handleGuardar}>
          {citaInicial ? 'Guardar cambios' : 'Agregar cita'}
        </button>
      </div>
    </div>
  );
}

function Field({ label, children, style }) {
  return (
    <div style={{ ...styles.field, ...style }}>
      <label style={styles.label}>{label}</label>
      {children}
    </div>
  );
}

  // ── Manifest dinámico (PWA) ──
  const manifest = {
    name: "Bitácora Podología a Domicilio",
    short_name: "Bitácora",
    description: "Registro de pacientes y citas de podología a domicilio",
    start_url: ".",
    display: "standalone",
    background_color: "#f6f4ef",
    theme_color: "#3a7d6c",
    icons: [
      { src: ICON_192, sizes: "192x192", type: "image/png", purpose: "any maskable" },
      { src: ICON_512, sizes: "512x512", type: "image/png", purpose: "any maskable" }
    ]
  };
  const manifestBlob = new Blob([JSON.stringify(manifest)], { type: 'application/json' });
  document.getElementById('manifest-link').href = URL.createObjectURL(manifestBlob);

  // ── Banner de instalación (Android / Chrome) ──
  let deferredPrompt;
  window.addEventListener('beforeinstallprompt', (e) => {
    e.preventDefault();
    deferredPrompt = e;
    const dismissed = localStorage.getItem('install-banner-dismissed');
    if (!dismissed) {
      document.getElementById('install-banner').style.display = 'flex';
    }
  });

  document.getElementById('install-btn').addEventListener('click', async () => {
    document.getElementById('install-banner').style.display = 'none';
    if (deferredPrompt) {
      deferredPrompt.prompt();
      await deferredPrompt.userChoice;
      deferredPrompt = null;
    }
  });

  document.getElementById('install-close').addEventListener('click', () => {
    document.getElementById('install-banner').style.display = 'none';
    localStorage.setItem('install-banner-dismissed', '1');
  });

  window.addEventListener('appinstalled', () => {
    document.getElementById('install-banner').style.display = 'none';
  });
</script>
